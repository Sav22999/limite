<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./css/style.css"/>
</head>

<body>
<div id="popup-content">
    <div id="website-section" class="section-popup background-primary"></div>
    <div id="toggle-section" class="section-popup">
        <div id="text-toggle-section" data-i18n="enable_limite_on_domain">
            Enable <span class="limite-text font-size-24px">Limite</span> on this domain
        </div>
        <div id="switch-toggle-section">
            <div id="toggle-container">
                <div id="toggle-background"></div>
                <div id="toggle-thumb"></div>
            </div>
        </div>
    </div>
    <div id="details-section" class="section-popup">
        <div id="details-container">
            <div class="grid-item grid-item-time-spent" data-i18n="time_spent_on_website">Time spent on this website</div>
            <div id="category-name" class="grid-item category-name-label"></div>
            <div class="grid-item grid-item-text1" data-i18n="today">Today</div>
            <div class="grid-item grid-item-value1" id="today-time"></div>
            <div class="grid-item grid-item-text2" data-i18n="since_install">Since install</div>
            <div class="grid-item grid-item-value2" id="always-time"></div>
            <div class="grid-item grid-item-text3" data-i18n="average_time">Average time</div>
            <div class="grid-item grid-item-value3" id="average-time"></div>
        </div>
    </div>
    <div id="open-all-websites"
         class="section-popup no-border-radius background-primary section-link section-border-bottom" data-i18n="see_all_time_spent">
        See all time spent
    </div>
    <div id="buy-me-a-coffee-section" class="section-popup border-radius-bottom background-primary section-link" data-i18n="buy_me_coffee">
        ☕ Buy me a coffee
    </div>
</div>
<script src="../js/definitions.js"></script>
<script src="./js/script.js"></script>
</body>

</html>
