<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../css/style.css"/>
    <title data-i18n="all_time_spent_title">Limite: all time spent</title>
    <link rel="icon" href="../img/icon.svg"/>
</head>

<body>
<div id="all-websites-dedication-section">
    <h1 id="title-all-time-spent" data-i18n="all_time_spent_title">All time spent</h1>
    <div class="section text-align-right sticky-section" id="actions">
        <input type="button" value="Settings" id="open-settings-button" class="button button-settings" data-i18n="settings_title"/>
        <input type="button" value="Refresh data" id="refresh-data-button" class="button button-refresh" data-i18n="refresh_data"/>
    </div>
    <div id="navigator-days">
        <span id="search-container">
            <input type="search" value="" placeholder="Search…" id="search-all-websites-text"
                   class="textbox search-box" data-i18n="search_placeholder"/>
        </span>
        <span id="nav-days-container">
            <label id="from-to-date-label"></label>
            <input type="button" value="Today" id="go-today-button"
                   class="button button-invert-colors button-go-today" data-i18n="today"/>
            <input type="button" value="Newer" id="go-newer-button" class="button button-invert-colors button-newer" data-i18n="newer"/>
            <input type="button" value="Older" id="go-older-button" class="button button-invert-colors button-older" data-i18n="older"/>
            <input type="button" value="Last" id="go-last-button"
                   class="button button-invert-colors button-go-last-day" data-i18n="last"/>
        </span>
    </div>
    <span id="all-websites-sections"></span>
    <div id="pagination-footer" class="hidden">
        <div id="pagination-controls"></div>
        <div id="pagination-items-per-page-container">
            <label id="items-per-page-label" data-i18n="items_per_page_label">Items per page:</label>
            <select id="items-per-page-all-websites" class="select-category settings-select">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="25">25</option>
                <option value="30">30</option>
                <option value="35">35</option>
                <option value="40">40</option>
                <option value="45">45</option>
                <option value="50">50</option>
                <option value="60">60</option>
                <option value="70">70</option>
                <option value="80">80</option>
                <option value="90">90</option>
                <option value="100">100</option>
            </select>
        </div>
    </div>
</div>
<script src="../js/definitions.js"></script>
<script src="../js/all-websites.js"></script>
</body>

</html>
